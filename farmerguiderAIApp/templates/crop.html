<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Crop Prediction</h2>
    <div class="form-container">
        <div class="row">
            <div class="column">
                <h3>Input Parameters</h3>
                <form action="{{ url_for('predict_crop') }}" method="POST">
                    <label for="N">Nitrogen (N):</label><br>
                    <input type="number" id="N" name="N" required><br><br>

                    <label for="P">Phosphorus (P):</label><br>
                    <input type="number" id="P" name="P" required><br><br>

                    <label for="K">Potassium (K):</label><br>
                    <input type="number" id="K" name="K" required><br><br>

                    <label for="temperature">Temperature (°C):</label><br>
                    <input type="number" step="0.1" id="temperature" name="temperature" required><br><br>

                    <label for="humidity">Humidity (%):</label><br>
                    <input type="number" step="0.1" id="humidity" name="humidity" required><br><br>

                    <label for="ph">pH:</label><br>
                    <input type="number" step="0.1" id="ph" name="ph" required><br><br>

                    <label for="rainfall">Rainfall (mm):</label><br>
                    <input type="number" step="0.1" id="rainfall" name="rainfall" required><br><br>

                    <input type="submit" value="Predict Crop">
                </form>
            </div>
            


</body>
</html>
