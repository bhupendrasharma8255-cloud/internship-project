<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Prediction Result</h1>

        {% if crop %}
            <p>The predicted crop is: <strong>{{ crop }}</strong></p>
        {% endif %}

        {% if fertilizer %}
            <p>The recommended fertilizer is: <strong>{{ fertilizer }}</strong></p>
        {% endif %}

        <a href="/">
            <button>Home</button>
        </a>
    </div>
</body>
</html>
